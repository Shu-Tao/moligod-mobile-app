pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

include ':app'

// Capacitor plugins - generated by Capacitor CLI
include ':capacitor-android'
project(':capacitor-android').projectDir = new File('./capacitor-android/capacitor')

include ':capacitor-app'
project(':capacitor-app').projectDir = new File('./capacitor-app')

include ':capacitor-device'
project(':capacitor-device').projectDir = new File('./capacitor-device')

include ':capacitor-keyboard'
project(':capacitor-keyboard').projectDir = new File('./capacitor-keyboard')

include ':capacitor-status-bar'
project(':capacitor-status-bar').projectDir = new File('./capacitor-status-bar')

include ':capacitor-browser'
project(':capacitor-browser').projectDir = new File('./capacitor-browser')

include ':capacitor-haptics'
project(':capacitor-haptics').projectDir = new File('./capacitor-haptics')

rootProject.name = "android"
